<!-- Recent Purchase Notification -->
<div id="recent-purchase"
    class="fixed bottom-6 left-6 z-[80] bg-white border border-brand-grey p-4 shadow-2xl flex items-center gap-4 max-w-xs transition-all duration-500 translate-y-20 opacity-0">
    <div class="w-12 h-16 bg-brand-grey flex-shrink-0 animate-pulse" id="recent-img"></div>
    <div class="flex-1">
        <p class="text-[8px] text-gray-400 font-bold tracking-widest uppercase mb-0.5">Verified Purchase</p>
        <p class="text-[10px] font-bold tracking-premium uppercase" id="recent-text">Someone from Delhi just bought
            Formal Shirt</p>
        <p class="text-[8px] text-brand-gold font-medium tracking-widest uppercase mt-1">2 mins ago</p>
    </div>
</div>
<script>
    // 3. Recent Purchase Rotation
    const names = ['Rohit', 'Siddharth', 'Vikram', 'Anjali', 'Sameer', 'Arjun', 'Isha'];
    const cities = ['Delhi', 'Mumbai', 'Bangalore', 'Chennai', 'Pune', 'Hyderabad'];
    const products = ['Formal Shirt', 'Slim-fit Trouser', 'Executive Blazer', 'Corporate Combo'];

    const showRecent = () => {
        const recent = document.getElementById('recent-purchase');
        if (!recent) return;
        const name = names[Math.floor(Math.random() * names.length)];
        const city = cities[Math.floor(Math.random() * cities.length)];
        const product = products[Math.floor(Math.random() * products.length)];

        document.getElementById('recent-text').innerHTML = `${name} from ${city} just bought <span class="text-brand-black font-bold">${product}</span>`;

        recent.classList.remove('translate-y-20', 'opacity-0');
        recent.classList.add('translate-y-0', 'opacity-100');

        setTimeout(() => {
            recent.classList.add('translate-y-20', 'opacity-0');
            recent.classList.remove('translate-y-0', 'opacity-100');
        }, 6000);
    };

    setInterval(showRecent, 15000);
    setTimeout(showRecent, 3000); // Initial trigger
</script>
